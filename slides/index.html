<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KeyVault Fund — Investor Deck</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; width: 100vw; height: 100vh; }

  #deck {
    width: 100vw; height: 100vh;
    position: relative;
  }

  iframe {
    width: 100%; height: 100%;
    border: none;
    display: block;
  }

  /* Nav controls */
  #controls {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 16px;
    background: rgba(0,0,0,0.75);
    border: 1px solid rgba(255,255,255,0.15);
    padding: 10px 20px;
    border-radius: 40px;
    backdrop-filter: blur(10px);
    z-index: 9999;
  }

  #controls button {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    font-size: 18px;
    width: 36px; height: 36px;
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  #controls button:hover { background: rgba(255,255,255,0.18); }
  #controls button:disabled { opacity: 0.25; cursor: default; }

  #slide-counter {
    color: rgba(255,255,255,0.6);
    font-family: -apple-system, Arial, sans-serif;
    font-size: 13px;
    letter-spacing: 0.1em;
    min-width: 60px;
    text-align: center;
  }

  .dot-nav {
    display: flex; gap: 8px; align-items: center;
  }
  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: rgba(255,255,255,0.25);
    cursor: pointer;
    transition: background 0.15s;
  }
  .dot.active { background: #00d4ff; }
</style>
</head>
<body>
<div id="deck">
  <iframe id="slide-frame" src="slide-1-crypto-adoption-FINAL.html"></iframe>
</div>

<div id="controls">
  <button id="prev" onclick="go(-1)" disabled>&#8592;</button>
  <div class="dot-nav" id="dots"></div>
  <span id="slide-counter">1 / 5</span>
  <button id="next" onclick="go(1)">&#8594;</button>
</div>

<script>
const slides = [
  'slide-1-crypto-adoption-FINAL.html',
  'slide2-vault-growth-FINAL.html',
  'slide3-sharpe-ratio-FINAL.html',
  'slide5-worst-days-FINAL.html',
  'slide6-operational-controls-FINAL.html',
  'slide8-risk-resilience-FINAL.html',
];

let current = 0;
const frame = document.getElementById('slide-frame');
const counter = document.getElementById('slide-counter');
const prevBtn = document.getElementById('prev');
const nextBtn = document.getElementById('next');
const dotsEl = document.getElementById('dots');

// Build dots
slides.forEach((_, i) => {
  const d = document.createElement('div');
  d.className = 'dot' + (i === 0 ? ' active' : '');
  d.onclick = () => goTo(i);
  dotsEl.appendChild(d);
});

function goTo(n) {
  current = n;
  frame.src = slides[current];
  counter.textContent = `${current + 1} / ${slides.length}`;
  prevBtn.disabled = current === 0;
  nextBtn.disabled = current === slides.length - 1;
  document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === current));
}

function go(dir) { goTo(current + dir); }

// Keyboard nav
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') go(1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   go(-1);
});
</script>
</body>
</html>
