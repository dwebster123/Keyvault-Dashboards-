<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Private KeyVault Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 50%, #0d0d1f 100%);
            min-height: 100vh;
            color: #ffffff;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            padding: 20px;
            position: relative;
        }

        .header img.logo {
            height: 120px;
            margin-bottom: 16px;
            filter: brightness(0) invert(1);
        }

        .header h1 {
            font-size: 2.2rem;
            background: linear-gradient(90deg, #00d4ff, #7c3aed, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .header .update-time {
            color: #6b6b8d;
            font-size: 0.85rem;
            margin-top: 8px;
        }

        .dashboard {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Hamburger Menu */
        .hamburger-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1001;
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #ffffff;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .hamburger-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(0, 212, 255, 0.4);
        }

        .hamburger-btn.open {
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            border-color: transparent;
        }

        .nav-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .nav-overlay.open {
            opacity: 1;
            visibility: visible;
        }

        .nav-menu {
            position: fixed;
            top: 0;
            right: -280px;
            width: 280px;
            height: 100vh;
            background: rgba(15, 15, 35, 0.97);
            backdrop-filter: blur(20px);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
            padding: 80px 20px 20px;
            transition: right 0.3s ease;
            overflow-y: auto;
        }

        .nav-menu.open {
            right: 0;
        }

        .nav-menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 20px;
            margin-bottom: 8px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: #8b8ba7;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .nav-menu-item:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            border-color: rgba(255, 255, 255, 0.15);
        }

        .nav-menu-item.active {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(124, 58, 237, 0.2));
            color: #ffffff;
            border-color: rgba(0, 212, 255, 0.3);
        }

        .nav-menu-item .nav-icon {
            font-size: 1.2rem;
            width: 24px;
            text-align: center;
        }

        /* Tab Navigation - hidden, replaced by hamburger */
        .tab-nav {
            display: none;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Metrics Grid - Consistent 3 columns */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .metrics-grid.two-col {
            grid-template-columns: repeat(2, 1fr);
        }

        @media (max-width: 900px) {
            .metrics-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 600px) {
            .metrics-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Metric Cards */
        .metric-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .metric-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
        }

        /* Color-coded borders */
        .metric-card.realized {
            border-color: rgba(34, 197, 94, 0.4);
        }

        .metric-card.pending {
            border-color: rgba(251, 191, 36, 0.4);
        }

        .metric-card.projected {
            border-color: rgba(56, 189, 248, 0.4);
        }

        .metric-card.prime {
            border-color: rgba(124, 58, 237, 0.4);
        }

        .metric-card.management {
            border-color: rgba(244, 114, 182, 0.4);
        }

        .metric-card.highlight {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.12) 0%, rgba(124, 58, 237, 0.12) 100%);
            border-color: rgba(0, 212, 255, 0.3);
        }

        .metric-card.grand-total {
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.15) 0%, rgba(0, 212, 255, 0.15) 100%);
            border-color: rgba(34, 197, 94, 0.5);
            grid-column: span 1;
        }

        .metric-card.flow-deposit {
            border-color: rgba(34, 197, 94, 0.4);
        }

        .metric-card.flow-withdrawal {
            border-color: rgba(239, 68, 68, 0.4);
        }

        .metric-card.flow-net {
            border-color: rgba(0, 212, 255, 0.4);
        }

        .metric-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            color: #8b8ba7;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }

        .metric-label .icon {
            font-size: 1rem;
        }

        .metric-value {
            font-size: 1.7rem;
            font-weight: 700;
            color: #ffffff;
            line-height: 1.2;
        }

        .metric-value.realized { color: #22c55e; }
        .metric-value.pending { color: #fbbf24; }
        .metric-value.projected { color: #38bdf8; }
        .metric-value.prime { color: #a78bfa; }
        .metric-value.management { color: #f472b6; }
        .metric-value.grand { color: #22c55e; font-size: 2rem; }
        .metric-value.withdrawal { color: #ef4444; }
        .metric-value.deposit { color: #22c55e; }

        .metric-subtext {
            font-size: 0.75rem;
            color: #6b6b8d;
            margin-top: 8px;
        }

        /* Tooltips */
        .has-tooltip {
            position: relative;
            cursor: help;
        }

        .has-tooltip .tooltip-text {
            visibility: hidden;
            opacity: 0;
            position: absolute;
            bottom: calc(100% + 8px);
            left: 50%;
            transform: translateX(-50%);
            background: #1e1e3f;
            color: #e2e2e2;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 400;
            text-transform: none;
            letter-spacing: 0;
            white-space: nowrap;
            max-width: 280px;
            white-space: normal;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.15);
            z-index: 100;
            transition: opacity 0.2s, visibility 0.2s;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        .has-tooltip:hover .tooltip-text {
            visibility: visible;
            opacity: 1;
        }

        /* Section Dividers */
        .section-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 35px 0 20px 0;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .section-header .icon {
            font-size: 1.3rem;
        }

        .section-header h2 {
            font-size: 1.2rem;
            font-weight: 600;
            color: #ffffff;
        }

        .section-header .badge {
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            color: #8b8ba7;
        }

        /* JLP Pool Health Widget */
        .jlp-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        @media (max-width: 600px) { .jlp-grid { grid-template-columns: 1fr; } }
        .jlp-asset-row {
            margin-bottom: 10px;
        }
        .jlp-asset-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.82rem;
            color: #b0b0cc;
            margin-bottom: 4px;
        }
        .jlp-bar-track {
            background: rgba(255,255,255,0.08);
            border-radius: 6px;
            height: 10px;
            overflow: hidden;
        }
        .jlp-bar-fill {
            height: 100%;
            border-radius: 6px;
            transition: width 0.6s ease;
        }
        .jlp-bar-green  { background: linear-gradient(90deg, #22c55e, #16a34a); }
        .jlp-bar-yellow { background: linear-gradient(90deg, #eab308, #ca8a04); }
        .jlp-bar-orange { background: linear-gradient(90deg, #f97316, #ea580c); }
        .jlp-bar-red    { background: linear-gradient(90deg, #ef4444, #dc2626); }
        .jlp-apy-badge {
            font-size: 1.5rem;
            font-weight: 700;
            color: #00d4ff;
        }
        .jlp-signal {
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            margin-top: 4px;
        }
        .jlp-note {
            font-size: 0.72rem;
            color: #6b6b8d;
            margin-top: 12px;
            font-style: italic;
        }

        /* Charts */
        .charts-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 800px) {
            .charts-row {
                grid-template-columns: 1fr;
            }
        }

        .chart-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .chart-card h3 {
            font-size: 1rem;
            margin-bottom: 20px;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chart-wrapper {
            position: relative;
            height: 220px;
        }

        .chart-wrapper.tall {
            height: 280px;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 60px;
            color: #8b8ba7;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            color: #ef4444;
        }

        /* Color Legend */
        .color-legend {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            color: #8b8ba7;
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .legend-dot.realized { background: #22c55e; }
        .legend-dot.pending { background: #fbbf24; }
        .legend-dot.projected { background: #38bdf8; }

        /* Flow History Table */
        .flow-table-wrap {
            overflow-x: auto;
            margin-bottom: 30px;
        }

        .flow-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        .flow-table th {
            text-align: left;
            padding: 12px 14px;
            background: rgba(255, 255, 255, 0.06);
            color: #8b8ba7;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 0.72rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            white-space: nowrap;
        }

        .flow-table td {
            padding: 12px 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            color: #c8c8e0;
        }

        .flow-table tr:hover td {
            background: rgba(255, 255, 255, 0.03);
        }

        .flow-type-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .flow-type-badge.deposit {
            background: rgba(34, 197, 94, 0.15);
            color: #22c55e;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .flow-type-badge.withdrawal {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        /* Log Flow Button */
        .log-flow-btn {
            padding: 10px 24px;
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            border: none;
            border-radius: 10px;
            color: #ffffff;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-left: auto;
        }

        .log-flow-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal-content {
            background: #1a1a3e;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 32px;
            width: 90%;
            max-width: 480px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-content h3 {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #ffffff;
        }

        .modal-field {
            margin-bottom: 16px;
        }

        .modal-field label {
            display: block;
            font-size: 0.8rem;
            color: #8b8ba7;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .modal-field input,
        .modal-field select,
        .modal-field textarea {
            width: 100%;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 10px;
            color: #ffffff;
            font-size: 0.9rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        .modal-field input:focus,
        .modal-field select:focus,
        .modal-field textarea:focus {
            border-color: rgba(0, 212, 255, 0.5);
        }

        .modal-field textarea {
            resize: vertical;
            min-height: 60px;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .modal-actions button {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }

        .modal-actions .btn-save {
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            color: #fff;
        }

        .modal-actions .btn-cancel {
            background: rgba(255, 255, 255, 0.08);
            color: #8b8ba7;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .modal-actions button:hover {
            transform: translateY(-1px);
        }

        .local-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.65rem;
            background: rgba(124, 58, 237, 0.2);
            color: #a78bfa;
            border: 1px solid rgba(124, 58, 237, 0.3);
            margin-left: 6px;
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <!-- Hamburger Menu -->
    <button class="hamburger-btn" id="hamburgerBtn" onclick="toggleMenu()">☰</button>
    <div class="nav-overlay" id="navOverlay" onclick="closeMenu()"></div>
    <nav class="nav-menu" id="navMenu">
        <div class="nav-menu-item active" data-tab="overview" onclick="switchTab('overview')">
            <span class="nav-icon">📊</span> Overview
        </div>
        <div class="nav-menu-item" data-tab="revenue" onclick="switchTab('revenue')">
            <span class="nav-icon">💎</span> Fee Revenue
        </div>
        <div class="nav-menu-item" data-tab="projections" onclick="switchTab('projections')">
            <span class="nav-icon">🔮</span> Projections
        </div>
        <div class="nav-menu-item" data-tab="flows" onclick="switchTab('flows')">
            <span class="nav-icon">🌊</span> Fund Flows
        </div>
        <div class="nav-menu-item" data-tab="crossplatform" onclick="switchTab('crossplatform')">
            <span class="nav-icon">⚡</span> Cross-Platform JLP
        </div>
    </nav>

    <div class="header">
        <img src="logo.png" alt="KeyVault" class="logo">
        <h1>Private KeyVault Dashboard</h1>
        <div class="update-time" id="updateTime">Loading...</div>
        <div id="fetchStatusBanner" style="margin-top:8px;padding:8px 18px;background:rgba(0,212,255,0.08);border:1px solid rgba(0,212,255,0.2);border-radius:8px;font-size:0.82rem;color:#8b8ba7;display:inline-block;"></div>
    </div>

    <div class="dashboard">
        <!-- Color Legend -->
        <div class="color-legend">
            <div class="legend-item"><span class="legend-dot realized"></span> Realized/Collected</div>
            <div class="legend-item"><span class="legend-dot pending"></span> Pending/Unrealized</div>
            <div class="legend-item"><span class="legend-dot projected"></span> Projected/Future</div>
        </div>

        <div id="content">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>Loading vault data...</p>
            </div>
        </div>
    </div>

    <!-- Log Flow Modal -->
    <div class="modal-overlay" id="flowModal">
        <div class="modal-content">
            <h3>🌊 Log New Flow</h3>
            <div class="modal-field">
                <label>Date</label>
                <input type="date" id="flowDate">
            </div>
            <div class="modal-field">
                <label>Type</label>
                <select id="flowType">
                    <option value="deposit">Deposit</option>
                    <option value="withdrawal">Withdrawal</option>
                </select>
            </div>
            <div class="modal-field">
                <label>Approximate Amount ($)</label>
                <input type="number" id="flowAmount" placeholder="500000">
            </div>
            <div class="modal-field">
                <label>Share Price at Execution</label>
                <input type="number" id="flowSharePrice" step="0.000001" placeholder="1.192">
            </div>
            <div class="modal-field">
                <label>Notes</label>
                <textarea id="flowNotes" placeholder="Optional notes..."></textarea>
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeFlowModal()">Cancel</button>
                <button class="btn-save" onclick="saveFlow()">Save Flow</button>
            </div>
        </div>
    </div>

    <script>
        // =========== MENU ===========
        function toggleMenu() {
            const menu = document.getElementById('navMenu');
            const overlay = document.getElementById('navOverlay');
            const btn = document.getElementById('hamburgerBtn');
            const isOpen = menu.classList.contains('open');
            menu.classList.toggle('open', !isOpen);
            overlay.classList.toggle('open', !isOpen);
            btn.classList.toggle('open', !isOpen);
            btn.textContent = isOpen ? '☰' : '✕';
        }

        function closeMenu() {
            document.getElementById('navMenu').classList.remove('open');
            document.getElementById('navOverlay').classList.remove('open');
            const btn = document.getElementById('hamburgerBtn');
            btn.classList.remove('open');
            btn.textContent = '☰';
        }

        function switchTab(tab) {
            activeTab = tab;
            closeMenu();
            // Update menu active state
            document.querySelectorAll('.nav-menu-item').forEach(item => {
                item.classList.toggle('active', item.dataset.tab === tab);
            });
            // Update tab content
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            const tabEl = document.getElementById('tab-' + tab);
            if (tabEl) tabEl.classList.add('active');
            // Re-render charts if needed
            if (tab === 'projections' && currentData && historicalData) {
                const m = calculateMetrics(currentData, historicalData);
                renderCharts(m);
            }
            if (tab === 'flows' && currentData && historicalData) {
                renderFlowChart();
            }
            if (tab === 'crossplatform') {
                renderCrossPlatformTab();
            }
        }

        // =========== FLOW MODAL ===========
        function openFlowModal() {
            document.getElementById('flowModal').classList.add('open');
            document.getElementById('flowDate').value = new Date().toISOString().split('T')[0];
        }

        function closeFlowModal() {
            document.getElementById('flowModal').classList.remove('open');
        }

        function saveFlow() {
            const flow = {
                id: 'local-' + Date.now(),
                date: document.getElementById('flowDate').value,

        function getPastQuarterEnds(inceptionDate) {
            const quarters = [];
            const now = new Date();
            const startYear = new Date(inceptionDate).getFullYear();
            for (let year = startYear; year <= now.getFullYear(); year++) {
                for (const qEnd of getQuarterEndDates(year)) {
                    if (qEnd > new Date(inceptionDate) && qEnd < now) quarters.push(qEnd);
                }
            }
            return quarters;
        }

        function getNextQuarterEnd() {
            const now = new Date();
            const year = now.getFullYear();
            for (const qEnd of getQuarterEndDates(year)) {

            }
            return getQuarterEndDates(year + 1)[0];

        function getSharePriceAtDate(history, targetDate) {
            const target = new Date(targetDate);
            let closest = history[0];
            let minDiff = Infinity;
            for (const h of history) {
                const diff = Math.abs(new Date(h.update_time_utc) - target);
                if (diff < minDiff && new Date(h.update_time_utc) <= target) {
                    minDiff = diff;
                    closest = h;
                }
            }
            return closest ? closest.SharePrice : null;
        }

        function calculatePerformanceFees(history, currentSharePrice, inceptionDate) {
            const initialPrice = history[0]?.SharePrice || 1;
            const pastQuarters = getPastQuarterEnds(inceptionDate);
            let realizedFees = 0;

            let lastRealizationDate = null;
            for (const qEnd of pastQuarters) {
                const priceAtQuarter = getSharePriceAtDate(history, qEnd);
                if (priceAtQuarter && priceAtQuarter > lastRealizedPrice) {
                    const gainPercent = (priceAtQuarter - lastRealizedPrice) / lastRealizedPrice;
                    const trueGrossGain = gainPercent / PRIME_NET_FACTOR;
                    realizedFees += trueGrossGain * FEE_CONFIG.performanceFeeRate * 100;
                    lastRealizedPrice = priceAtQuarter;
                    lastRealizationDate = qEnd;
                }
            }
            let unrealizedFees = 0;
            if (currentSharePrice > lastRealizedPrice) {
                const unrealizedGainPercent = (currentSharePrice - lastRealizedPrice) / lastRealizedPrice;
                const trueGrossUnrealizedGain = unrealizedGainPercent / PRIME_NET_FACTOR;
                unrealizedFees = trueGrossUnrealizedGain * FEE_CONFIG.performanceFeeRate * 100;
            }
            return {
                realizedFees, unrealizedFees,
                totalFees: realizedFees + unrealizedFees,
                lastRealizationDate,
                nextQuarterEnd: getNextQuarterEnd(),
                pastQuartersCount: pastQuarters.length

        function calculateMetrics(data, history) {
            const tvl = data.tvl || data.TVL || 0;
            const sharePrice = data.SharePrice || data.sharePrice || 1;
            const updateTime = data.update_time_utc || data.updateTime || new Date().toISOString();
            const historyArray = Array.isArray(history) ? history : [history];
            const sortedHistory = [...historyArray].sort((a, b) => new Date(a.update_time_utc) - new Date(b.update_time_utc));
            const initialSharePrice = sortedHistory.length > 0 ? sortedHistory[0].SharePrice : 1;
            const firstDate = sortedHistory.length > 0 ? new Date(sortedHistory[0].update_time_utc) : new Date();
            const lastDate = sortedHistory.length > 1 ? new Date(sortedHistory[sortedHistory.length - 1].update_time_utc) : new Date();
            const totalDays = Math.max(1, Math.round((lastDate - firstDate) / (1000 * 60 * 60 * 24)));
            const currentBalance = tvl;
            const totalShares = data.totalShares || TOTAL_SHARES || (tvl / sharePrice);
            // cumulativeNetDeposits = the original capital deployed into the vault.
            // Since inception share price was $1.00, shares issued ≈ dollars deposited.
            // We use totalShares × initialSharePrice to correctly scale even if initial price ≠ $1.00.
            const cumulativeNetDeposits = totalShares * initialSharePrice;
            // TRUE EARNINGS: Public vault (hardcoded, final) + Private vault (live)
            // Public vault earnings (LOCKED - all capital withdrawn, never changes):
            //   EVd3ATEW: $203,650 | Dq95Pq71: $8,305 | AV3oo27Y: $34
            // Source: Drift UI, verified 2026-02-15
            // Public vault earnings (LOCKED, net of Prime fees): $211,989
            // Private vault earnings: queried from Drift depositor accounts
            // TODO: auto-query private vault earnings in daily NAV stamp
            // For now: hardcoded from Drift UI (2026-02-15): $1,467
            const PUBLIC_VAULT_EARNINGS = 211989;
            const PRIVATE_VAULT_EARNINGS = 1467; // Updates with share price — refresh manually or via NAV stamp
            const totalPNL = PUBLIC_VAULT_EARNINGS + PRIVATE_VAULT_EARNINGS;
            const sharePriceReturn = ((sharePrice - initialSharePrice) / initialSharePrice) * 100;
            const grossReturn = sharePriceReturn / PRIME_NET_FACTOR;
            const netReturn = sharePriceReturn >= 0 ? sharePriceReturn * NET_INVESTOR_FACTOR : sharePriceReturn;
            const allTimeAPY = totalDays > 0 ? (netReturn / totalDays) * 365 : 0;
            const rollingAPYs = calculateRollingAPYs(sortedHistory, sharePrice);
            const inceptionDate = sortedHistory[0]?.update_time_utc || new Date().toISOString();
            const performanceFees = calculatePerformanceFees(sortedHistory, sharePrice, inceptionDate);
            const realizedFeeDollars = (performanceFees.realizedFees / 100) * cumulativeNetDeposits;
            const unrealizedFeeDollars = (performanceFees.unrealizedFees / 100) * cumulativeNetDeposits;
            const primeRealizedFeeDollars = realizedFeeDollars * (FEE_CONFIG.primeNumberFeeRate / FEE_CONFIG.performanceFeeRate);
            const primeUnrealizedFeeDollars = unrealizedFeeDollars * (FEE_CONFIG.primeNumberFeeRate / FEE_CONFIG.performanceFeeRate);
            // Management fee = 2% of original investor deposits (charged before vault entry).
            // If investor deposited $X, they paid $X × 2% = mgmtFee, and $X × 98% went into vault.
            // cumulativeNetDeposits = shares × initialPrice ≈ what went INTO the vault.
            // So original deposits = cumulativeNetDeposits / (1 - managementFeeRate).
            const originalDeposits = cumulativeNetDeposits / (1 - FEE_CONFIG.managementFeeRate);
            const managementFeeDollars = originalDeposits * FEE_CONFIG.managementFeeRate;
            const totalRealizedRevenue = realizedFeeDollars + primeRealizedFeeDollars + managementFeeDollars;
            const totalUnrealizedRevenue = unrealizedFeeDollars + primeUnrealizedFeeDollars;
            const totalRevenue = totalRealizedRevenue + totalUnrealizedRevenue;
            const now = new Date();
            const endOfYear = new Date(now.getFullYear(), 11, 31, 17, 0, 0);
            const daysRemaining = Math.max(0, Math.ceil((endOfYear - now) / (1000 * 60 * 60 * 24)));
            const projectedTotalReturn = allTimeAPY;
            const projectedGrossReturn = allTimeAPY / (NET_INVESTOR_FACTOR * PRIME_NET_FACTOR); // net / (0.80 * 0.90) = true gross
            const projectedPerformanceFees = (projectedGrossReturn / 100) * FEE_CONFIG.performanceFeeRate * cumulativeNetDeposits;
            const projectedPrimeFees = (projectedGrossReturn / 100) * FEE_CONFIG.primeNumberFeeRate * cumulativeNetDeposits;
            const projectedTotalRevenue = projectedPerformanceFees + projectedPrimeFees + managementFeeDollars;
            return {
                currentBalance, cumulativeNetDeposits, originalDeposits, sharePrice, grossReturn, netReturn,
                allTimeAPY, rollingAPYs, totalPNL, totalDays, updateTime, history: sortedHistory,
                performanceFees, realizedFeeDollars, unrealizedFeeDollars,
                primeRealizedFeeDollars, primeUnrealizedFeeDollars, managementFeeDollars,
                totalRealizedRevenue, totalUnrealizedRevenue, totalRevenue,
                daysRemaining, projectedTotalReturn, projectedPerformanceFees,
                projectedPrimeFees, projectedTotalRevenue
            };
        }

        function calculateRollingAPYs(history, currentSharePrice) {
            const periods = [
                { name: '7D', days: 7 }, { name: '30D', days: 30 },
                { name: '90D', days: 90 }, { name: '180D', days: 180 },
                { name: 'All Time', days: history.length }
            ];
            return periods.map(period => {
                const daysAvailable = Math.min(period.days, history.length);
                if (daysAvailable < 1) return { name: period.name, days: 0, requestedDays: period.days, return: 0, apy: 0, insufficient: false };
                const startIndex = Math.max(0, history.length - daysAvailable);
                const startPrice = history[startIndex].SharePrice;
                const periodReturn = ((currentSharePrice - startPrice) / startPrice) * 100;
                const netPeriodReturn = periodReturn >= 0 ? periodReturn * NET_INVESTOR_FACTOR : periodReturn;
                const annualizedAPY = (netPeriodReturn / daysAvailable) * 365;
                const insufficient = period.name !== 'All Time' && daysAvailable < period.days;
                return { name: period.name, days: daysAvailable, requestedDays: period.days, return: netPeriodReturn, apy: annualizedAPY, insufficient };
            });
        }

        function calculateFlowAdjustedNAV(navHistory, flows) {
            // The idea: share price doesn't change from flows (proportional burn/mint),
            // but TVL does. We want to show "what would TVL be if all capital stayed?"
            // Approach: track a counterfactual TVL that starts at the first TVL we know,
            // and applies the same daily share price returns, but adds back withdrawn amounts
            // and removes extra deposited amounts.

            if (!navHistory || navHistory.length === 0) return [];

            const sorted = [...navHistory].sort((a, b) => new Date(a.update_time_utc) - new Date(b.update_time_utc));
            const allFlows = (flows || []).sort((a, b) => new Date(a.date) - new Date(b.date));

            // Build flow impact map by date
            const flowImpact = {};
            for (const f of allFlows) {
                const d = f.date;
                if (!flowImpact[d]) flowImpact[d] = 0;
                // For the counterfactual: withdrawals mean capital LEFT, so we ADD it back
                // Deposits mean extra capital came IN, so we SUBTRACT it
                if (f.type === 'withdrawal') flowImpact[d] += (f.amount_approx || 0);
                else flowImpact[d] -= (f.amount_approx || 0);
            }

            // We compute a "counterfactual TVL" line using actual share price returns
            // applied to an adjusted TVL that accounts for flow impacts
            const result = [];
            let adjustedTvl = null;

            for (let i = 0; i < sorted.length; i++) {
                const entry = sorted[i];
                const date = (entry.update_time_utc || '').split('T')[0] || entry.date;

                if (i === 0) {
                    adjustedTvl = entry.tvl || (entry.SharePrice * TOTAL_SHARES);
                    // Add back any flows that happened before or on the first date
                    if (flowImpact[date]) adjustedTvl += flowImpact[date];
                } else {
                    // Apply same return as actual share price
                    const prevPrice = sorted[i - 1].SharePrice;
                    const curPrice = entry.SharePrice;
                    if (prevPrice > 0) {
                        const dailyReturn = curPrice / prevPrice;
                        adjustedTvl = adjustedTvl * dailyReturn;
                    }
                    // Add back flow impacts for this date
                    if (flowImpact[date]) adjustedTvl += flowImpact[date];
                }

                // Convert adjusted TVL to a "counterfactual share price" using original total shares
                // Use the total shares from the first entry (before any flows changed share count)
                const originalShares = sorted[0].tvl ? (sorted[0].tvl / sorted[0].SharePrice) : TOTAL_SHARES;
                const adjustedSharePrice = adjustedTvl / originalShares;

                result.push({
                    date: date,
                    actualPrice: entry.SharePrice,
                    adjustedPrice: adjustedSharePrice,
                    actualTvl: entry.tvl,
                    adjustedTvl: adjustedTvl
                });
            }

            return result;
        }

        // ── JLP Pool Health Widget ──────────────────────────────────────────
        async function loadJlpPoolHealth() {
            const container = document.getElementById('jlp-pool-health');
            const badge = document.getElementById('jlp-signal-badge');
            if (!container) return;

            // Use CORS proxy since Jupiter API doesn't support browser CORS
            const PROXY = 'https://keyvault-proxy.deven-m-webster.workers.dev';
            const API   = 'https://perps-api.jup.ag/v2/jlp-info';
            let data;
            try {
                const res = await fetch(`${PROXY}/?url=${encodeURIComponent(API)}`);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                data = await res.json();
            } catch (e) {
                container.innerHTML = `<div style="color:#ef4444;font-size:0.85rem;">⚠️ Could not load JLP data: ${e.message}</div>`;
                return;
            }

            const aumUsd   = parseFloat(data.aumUsdFormatted);
            const aumLimit = parseFloat(data.aumLimitUsdFormatted);
            const apyPct   = parseFloat(data.jlpApyPct);
            const capPct   = (aumUsd / aumLimit) * 100;
            const custodies = data.custodies || [];

            // Determine signal
            const maxUtil = Math.max(...custodies.map(c => parseFloat(c.utilizationPct)));
            let signal, signalColor;
            if (maxUtil > 70)      { signal = '🔴 Hot — Cap raise likely, fees elevated';          signalColor = '#ef4444'; }
            else if (maxUtil > 50) { signal = '🟠 High — Elevated fees, watch for cap raise signal'; signalColor = '#f97316'; }
            else if (maxUtil > 20) { signal = '🟡 Moderate — Normal fee generation';               signalColor = '#eab308'; }
            else                   { signal = '🟢 Low Activity — Bear market conditions';           signalColor = '#22c55e'; }

            if (badge) {
                badge.textContent = `APY ${apyPct.toFixed(2)}%`;
                badge.style.background = 'rgba(0,212,255,0.15)';
                badge.style.color = '#00d4ff';
            }

            function barClass(pct) {
                if (pct >= 80) return 'jlp-bar-red';
                if (pct >= 60) return 'jlp-bar-orange';
                if (pct >= 30) return 'jlp-bar-yellow';
                return 'jlp-bar-green';
            }
            function fmtUsd(n) {
                if (n >= 1e9) return '$' + (n/1e9).toFixed(2) + 'B';
                if (n >= 1e6) return '$' + (n/1e6).toFixed(0) + 'M';
                return '$' + n.toFixed(0);
            }

            const assetBars = custodies.map(c => {
                const pct = parseFloat(c.utilizationPct);
                return `
                <div class="jlp-asset-row">
                    <div class="jlp-asset-label">
                        <span><strong>${c.symbol}</strong></span>
                        <span>${pct.toFixed(2)}% utilized</span>
                    </div>

        // Fetch the latest JLP 3x Mixed strategy data point and extend primeProFormaData
        async function fetchJlpStrategyLatest() {
            try {
                const res = await fetch('data/jlp-strategy-latest.json?t=' + Date.now());
                if (!res.ok) throw new Error(`HTTP ${res.status}`);

                if (!latest.endDate || isNaN(latest.cumulative)) return;
                const lastEntry = primeProFormaData[primeProFormaData.length - 1];
                if (latest.endDate > lastEntry.date) {
                    // Interpolate any missing daily points between last hardcoded and new endpoint
                    const startDate = new Date(lastEntry.date);
                    const endDate = new Date(latest.endDate);
                    const startRoi = lastEntry.roi;
                    const endRoi = latest.cumulative;
                    const totalDays = (endDate - startDate) / 86400000;
                    for (let i = 1; i <= totalDays; i++) {
                        const d = new Date(startDate);
                        d.setDate(d.getDate() + i);
                        const dateStr = d.toISOString().slice(0, 10);
                        const interpolated = startRoi + (endRoi - startRoi) * (i / totalDays);
                        primeProFormaData.push({ date: dateStr, roi: parseFloat(interpolated.toFixed(2)) });
                    }
                    console.log(`[JLP Strategy] Extended to ${latest.endDate} (+${latest.cumulative}%)`);

        function switchCompPeriod(period, btn) {
            cpCompPeriod = period;

        function renderCPComparisonChart(period) {
            period = period || cpCompPeriod;
            const ctx = document.getElementById('comparisonChartVault')?.getContext('2d');
            if (!ctx || !historicalData) return;

            const today = new Date();
            let windowStart;
            if (period === 'all' || period === undefined) {
                windowStart = '2025-11-06';
            } else {
                const d = new Date(today);
                d.setDate(d.getDate() - parseInt(period));
                windowStart = d.toISOString().slice(0, 10);
            }

            // Build KV data from official NAV history
            const kvFiltered = historicalData.filter(h => {
                const d = (h.update_time_utc || h.timestamp || '').slice(0, 10);
                return d >= windowStart;
            });
            if (kvFiltered.length === 0) return;

            const kvBaseline = kvFiltered[0].SharePrice;
            const kvDataMap = {};
            kvFiltered.forEach(h => {
                const d = (h.update_time_utc || h.timestamp || '').slice(0, 10);
                const roi = ((h.SharePrice - kvBaseline) / kvBaseline) * 100 * NET_INVESTOR_FACTOR_CP;
                kvDataMap[d] = roi;
            });

            // Build prime data map from pro-forma + JLP extension, net of fees (same factor as KV for apples-to-apples)
            const primeDataMap = {};
            primeProFormaData.filter(d => d.date >= windowStart).forEach(d => {
                primeDataMap[d.date] = d.roi * NET_INVESTOR_FACTOR_CP;
            });
            // Re-baseline to 0 at window start
            const primeStartDate = Object.keys(primeDataMap).sort()[0];
            const primeBaseline = primeStartDate ? primeDataMap[primeStartDate] : 0;
            Object.keys(primeDataMap).forEach(d => { primeDataMap[d] -= primeBaseline; });

            // Split pro forma vs live at cutoff
            const primeProFormaMap = {};
            const primeLiveMap = {};
            Object.entries(primeDataMap).forEach(([date, val]) => {
                if (date <= LIVE_TRADING_CUTOFF) primeProFormaMap[date] = val;
                else primeLiveMap[date] = val;
            });
            const bridgeDate = Object.keys(primeDataMap).filter(d => d <= LIVE_TRADING_CUTOFF).sort().pop();
            if (bridgeDate) primeLiveMap[bridgeDate] = primeProFormaMap[bridgeDate];
            const nextDate = Object.keys(primeDataMap).filter(d => d > LIVE_TRADING_CUTOFF).sort()[0];
            if (nextDate) primeProFormaMap[nextDate] = primeLiveMap[nextDate];

            const allDates = new Set([...Object.keys(kvDataMap), ...Object.keys(primeDataMap)]);
            const sortedDates = Array.from(allDates).sort();

            // Forward-fill helper: carry last known value forward, but only after the series has started
            function forwardFill(map, dates) {
                const mapDates = Object.keys(map).sort();
                if (mapDates.length === 0) return dates.map(() => null);
                const seriesStart = mapDates[0];
                const seriesEnd = mapDates[mapDates.length - 1];
                let last = null;
                return dates.map(d => {
                    if (d < seriesStart || d > seriesEnd) return null;
                    if (map[d] !== undefined) { last = map[d]; return last; }
                    return last; // carry forward within range
                });
            }

            const kvArr = forwardFill(kvDataMap, sortedDates);
            const proFormaArr = forwardFill(primeProFormaMap, sortedDates);
            const liveArr = forwardFill(primeLiveMap, sortedDates);

            if (cpCompChartInstance) { cpCompChartInstance.destroy(); cpCompChartInstance = null; }

            cpCompChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: sortedDates,
                    datasets: [
                        {
                            label: 'KeyVault Current Strategy (Actual)',
                            data: kvArr,
                            borderColor: '#22c55e',
                            backgroundColor: 'rgba(34,197,94,0.1)',
                            fill: true, tension: 0.3, pointRadius: 0, borderWidth: 2.5, spanGaps: false, order: 2
                        },
                        {
                            label: 'Cross-Platform JLP — Pro Forma (through Jan 15)',
                            data: proFormaArr,
                            borderColor: 'rgba(244,114,182,0.5)',
                            backgroundColor: 'transparent',
                            borderDash: [5, 4],
                            fill: false, tension: 0.3, pointRadius: 0, borderWidth: 2, spanGaps: true, order: 1
                        },
                        {
                            label: 'Cross-Platform JLP — Live (Jan 15+)',
                            data: liveArr,
                            borderColor: '#f472b6',
                            backgroundColor: 'rgba(244,114,182,0.08)',
                            fill: true, tension: 0.3, pointRadius: 0, borderWidth: 2.5, spanGaps: false, order: 1
                        }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        legend: {
                            display: true, position: 'top',
                            labels: { color: '#8b8ba7', usePointStyle: true, padding: 15, font: { size: 12 } }
                        },
                        tooltip: {
                            backgroundColor: 'rgba(26,26,62,0.95)',
                            titleColor: '#fff', bodyColor: '#8b8ba7',
                            callbacks: {
                                label: ctx => ctx.parsed.y === null ? null : `${ctx.dataset.label}: ${ctx.parsed.y >= 0 ? '+' : ''}${ctx.parsed.y.toFixed(2)}%`
                            }
                        }
                    },
                    scales: {
                        x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#6b6b8d', maxTicksLimit: 10 } },
                        y: {
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { color: '#8b8ba7', callback: v => v.toFixed(0) + '%' },
                            title: { display: true, text: 'Cumulative ROI %', color: '#6b6b8d' }
                        }
                    }
                }
            });

            // Metrics
            const kvDates = Object.keys(kvDataMap).sort();
            const primeDatesArr = Object.keys(primeDataMap).sort();
            const kvSet = new Set(kvDates);
            const common = primeDatesArr.filter(d => kvSet.has(d)).sort();
            if (common.length === 0) return;
            const latest = common[common.length - 1];
            const days = Math.floor((new Date(latest + 'T12:00:00') - new Date(common[0] + 'T12:00:00')) / 86400000);
            const kvRoi = kvDataMap[latest] || 0;
            const primeRoi = primeDataMap[latest] || 0;
            const kvAPY = days > 0 ? (kvRoi / days) * 365 : 0;
            const primeAPY = days > 0 ? (primeRoi / days) * 365 : 0;
            const outperf = primeRoi - kvRoi;

            document.getElementById('comparisonMetricsVault').innerHTML = `
                <div class="metric-card realized"><div class="metric-label">Current Strategy ROI (Actual)</div><div class="metric-value realized">+${kvRoi.toFixed(2)}%</div><div class="metric-subtext">Net of fees · ${days} days</div></div>
                <div class="metric-card" style="border-color:rgba(244,114,182,0.4)"><div class="metric-label">Cross-Platform JLP ROI</div><div class="metric-value" style="color:#f472b6">+${primeRoi.toFixed(2)}%</div><div class="metric-subtext">Net of fees · ${days} days</div></div>
                <div class="metric-card realized"><div class="metric-label">Current Strategy APY</div><div class="metric-value realized">+${kvAPY.toFixed(2)}%</div><div class="metric-subtext">Annualized, net of fees</div></div>
                <div class="metric-card" style="border-color:rgba(244,114,182,0.4)"><div class="metric-label">Cross-Platform APY</div><div class="metric-value" style="color:#f472b6">+${primeAPY.toFixed(2)}%</div><div class="metric-subtext">Annualized, net of fees</div></div>
                <div class="metric-card highlight" style="grid-column:span 2"><div class="metric-label">Cross-Platform Outperformance</div><div class="metric-value" style="color:#a78bfa">${outperf >= 0 ? '+' : ''}${outperf.toFixed(2)}%</div><div class="metric-subtext">Additional return vs current strategy (same period)</div></div>
            `;
        }
