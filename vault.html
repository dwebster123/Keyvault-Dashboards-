<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Private KeyVault Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 50%, #0d0d1f 100%);
            min-height: 100vh;
            color: #ffffff;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
        }

        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #00d4ff, #7c3aed, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .header .vault-address {
            font-family: monospace;
            font-size: 0.85rem;
            color: #8b8ba7;
            word-break: break-all;
            max-width: 600px;
            margin: 0 auto;
        }

        .header .update-time {
            color: #6b6b8d;
            font-size: 0.9rem;
            margin-top: 10px;
        }

        .dashboard {
            max-width: 1400px;
            margin: 0 auto;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .metric-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .metric-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .metric-card.primary {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.15) 0%, rgba(124, 58, 237, 0.15) 100%);
            border-color: rgba(0, 212, 255, 0.3);
        }

        .metric-card.positive {
            border-color: rgba(34, 197, 94, 0.3);
        }

        .metric-card.warning {
            border-color: rgba(251, 191, 36, 0.3);
        }

        .metric-label {
            font-size: 0.85rem;
            color: #8b8ba7;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .metric-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #ffffff;
        }

        .metric-value.positive {
            color: #22c55e;
        }

        .metric-value.negative {
            color: #ef4444;
        }

        .metric-subtext {
            font-size: 0.8rem;
            color: #6b6b8d;
            margin-top: 8px;
        }

        .chart-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 30px;
        }

        .chart-title {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #ffffff;
        }

        .chart-wrapper {
            position: relative;
            height: 300px;
        }

        .section-title {
            font-size: 1.5rem;
            margin: 30px 0 20px 0;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
            color: #00d4ff;
        }

        .fee-structure {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .fee-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .fee-row:last-child {
            border-bottom: none;
        }

        .fee-label {
            color: #8b8ba7;
        }

        .fee-value {
            font-weight: 600;
            color: #ffffff;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #8b8ba7;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            color: #ef4444;
        }

        .two-col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .two-col {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 1.8rem;
            }

            .metric-value {
                font-size: 1.4rem;
            }
        }

        .tooltip {
            position: relative;
            cursor: help;
        }

        .tooltip::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a3e;
            color: #fff;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.75rem;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .tooltip:hover::after {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Private KeyVault Dashboard</h1>
        <div class="vault-address">Vault: G3RT2wdEYCphzcvXEHb8u4Yc4ZRscsQ1KRYywdBjgUZp</div>
        <div class="update-time" id="updateTime">Loading...</div>
    </div>

    <div class="dashboard">
        <div id="content">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>Loading vault data...</p>
            </div>
        </div>
    </div>

    <script>
        // Fee structure (20% performance fee + 10% Prime Number fee = 30% total on gains)
        // Plus 2% management fee taken upfront before deposits enter vault
        const FEE_CONFIG = {
            performanceFeeRate: 0.20,          // 20% performance fee (your share)
            primeNumberFeeRate: 0.10,          // 10% prime number fee
            totalFeeRate: 0.30,                // 30% total fees on gains
            managementFeeRate: 0.02            // 2% management fee (taken before vault entry)
        };

        // Quarter end dates for fee realization (5pm ET on last day of quarter)
        function getQuarterEndDates(year) {
            return [
                new Date(`${year}-03-31T17:00:00-05:00`), // Q1
                new Date(`${year}-06-30T17:00:00-04:00`), // Q2 (EDT)
                new Date(`${year}-09-30T17:00:00-04:00`), // Q3 (EDT)
                new Date(`${year}-12-31T17:00:00-05:00`)  // Q4 (EST)
            ];
        }

        // Get all past quarter ends since fund inception
        function getPastQuarterEnds(inceptionDate) {
            const quarters = [];
            const now = new Date();
            const startYear = new Date(inceptionDate).getFullYear();

            for (let year = startYear; year <= now.getFullYear(); year++) {
                const yearQuarters = getQuarterEndDates(year);
                for (const qEnd of yearQuarters) {
                    if (qEnd > new Date(inceptionDate) && qEnd < now) {
                        quarters.push(qEnd);
                    }
                }
            }
            return quarters;
        }

        // Get next quarter end date
        function getNextQuarterEnd() {
            const now = new Date();
            const year = now.getFullYear();
            const quarters = getQuarterEndDates(year);

            for (const qEnd of quarters) {
                if (qEnd > now) return qEnd;
            }
            // Next year Q1
            return getQuarterEndDates(year + 1)[0];
        }

        // Find the share price at a specific date from history
        function getSharePriceAtDate(history, targetDate) {
            const target = new Date(targetDate);
            let closest = history[0];
            let minDiff = Infinity;

            for (const h of history) {
                const hDate = new Date(h.update_time_utc);
                const diff = Math.abs(hDate - target);
                if (diff < minDiff && hDate <= target) {
                    minDiff = diff;
                    closest = h;
                }
            }
            return closest ? closest.SharePrice : null;
        }

        // Calculate realized and unrealized performance fees
        function calculatePerformanceFees(history, currentSharePrice, inceptionDate) {
            const initialPrice = history[0]?.SharePrice || 1;
            const pastQuarters = getPastQuarterEnds(inceptionDate);

            let realizedFees = 0;
            let lastRealizedPrice = initialPrice;
            let lastRealizationDate = null;

            // Calculate realized fees from each past quarter
            for (const qEnd of pastQuarters) {
                const priceAtQuarter = getSharePriceAtDate(history, qEnd);
                if (priceAtQuarter && priceAtQuarter > lastRealizedPrice) {
                    // Gain since last realization
                    const gainPercent = (priceAtQuarter - lastRealizedPrice) / lastRealizedPrice;
                    realizedFees += gainPercent * FEE_CONFIG.performanceFeeRate * 100;
                    lastRealizedPrice = priceAtQuarter;
                    lastRealizationDate = qEnd;
                }
            }

            // Calculate unrealized fees (gains since last quarter end)
            let unrealizedFees = 0;
            if (currentSharePrice > lastRealizedPrice) {
                const unrealizedGainPercent = (currentSharePrice - lastRealizedPrice) / lastRealizedPrice;
                unrealizedFees = unrealizedGainPercent * FEE_CONFIG.performanceFeeRate * 100;
            }

            // Calculate dollar amounts based on a reference (total PNL)
            const totalGainPercent = (currentSharePrice - initialPrice) / initialPrice;

            return {
                realizedFees,           // As percentage of initial investment
                unrealizedFees,         // As percentage of initial investment
                totalFees: realizedFees + unrealizedFees,
                lastRealizationDate,
                nextQuarterEnd: getNextQuarterEnd(),
                pastQuartersCount: pastQuarters.length
            };
        }

        const VAULT_ADDRESS = 'G3RT2wdEYCphzcvXEHb8u4Yc4ZRscsQ1KRYywdBjgUZp';

        let currentData = null;
        let historicalData = null;
        let chart = null;

        async function fetchData() {
            try {
                const [currentResponse, historyResponse] = await Promise.all([
                    fetch('https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent('https://app.primenumber.trade/data/PN_KV1.json')),
                    fetch('https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent('https://app.primenumber.trade/data/PN_KV1_history.json'))
                ]);

                currentData = await currentResponse.json();
                historicalData = await historyResponse.json();

                renderDashboard();
            } catch (error) {
                console.error('Error fetching data:', error);
                document.getElementById('content').innerHTML = `
                    <div class="error">
                        <p>Error loading vault data. Please try again later.</p>
                        <p style="font-size: 0.8rem; margin-top: 10px;">${error.message}</p>
                    </div>
                `;
            }
        }

        function calculateMetrics(data, history) {
            // Get current values - handle both object and array formats
            const tvl = data.tvl || data.TVL || (Array.isArray(data) ? data[data.length - 1]?.tvl : 0);
            const sharePrice = data.SharePrice || data.sharePrice || (Array.isArray(data) ? data[data.length - 1]?.SharePrice : 1);
            const updateTime = data.update_time_utc || data.updateTime || (Array.isArray(data) ? data[data.length - 1]?.update_time_utc : new Date().toISOString());

            // Get historical data for calculations
            const historyArray = Array.isArray(history) ? history : [history];
            const sortedHistory = historyArray.sort((a, b) => new Date(a.update_time_utc) - new Date(b.update_time_utc));

            const initialSharePrice = sortedHistory.length > 0 ? sortedHistory[0].SharePrice : 1;
            const totalDays = sortedHistory.length;

            // Current Balance = TVL (AUM)
            const currentBalance = tvl;

            // Cumulative Net Deposits = TVL / Share Price (base capital without returns)
            const cumulativeNetDeposits = tvl / sharePrice;

            // Total PNL = Current Balance - Net Deposits
            const totalPNL = currentBalance - cumulativeNetDeposits;

            // Calculate returns as percentage
            const grossReturn = ((sharePrice - initialSharePrice) / initialSharePrice) * 100;

            // Net return after 30% fees
            const netReturn = grossReturn * (1 - FEE_CONFIG.totalFeeRate);

            // All-time APY (annualized, net of fees)
            const allTimeAPY = totalDays > 0 ? (netReturn / totalDays) * 365 : 0;

            // Calculate rolling APYs
            const rollingAPYs = calculateRollingAPYs(sortedHistory, sharePrice);

            // Calculate performance fees
            const inceptionDate = sortedHistory[0]?.update_time_utc || new Date().toISOString();
            const performanceFees = calculatePerformanceFees(sortedHistory, sharePrice, inceptionDate);

            // Calculate dollar amounts for fees based on net deposits
            const realizedFeeDollars = (performanceFees.realizedFees / 100) * cumulativeNetDeposits;
            const unrealizedFeeDollars = (performanceFees.unrealizedFees / 100) * cumulativeNetDeposits;

            // Calculate Prime Number fees (10% - same schedule as performance fees)
            const primeRealizedFeeDollars = (performanceFees.realizedFees / 100) * cumulativeNetDeposits * (FEE_CONFIG.primeNumberFeeRate / FEE_CONFIG.performanceFeeRate);
            const primeUnrealizedFeeDollars = (performanceFees.unrealizedFees / 100) * cumulativeNetDeposits * (FEE_CONFIG.primeNumberFeeRate / FEE_CONFIG.performanceFeeRate);

            // Calculate Management Fee (2% taken before vault entry - reverse engineer)
            // If vault shows deposits of X, original was X / (1 - 0.02), so fee = X * (0.02 / 0.98)
            const managementFeeDollars = cumulativeNetDeposits * (FEE_CONFIG.managementFeeRate / (1 - FEE_CONFIG.managementFeeRate));

            // Total Revenue calculations
            const totalRealizedRevenue = realizedFeeDollars + primeRealizedFeeDollars + managementFeeDollars;
            const totalUnrealizedRevenue = unrealizedFeeDollars + primeUnrealizedFeeDollars;
            const totalRevenue = totalRealizedRevenue + totalUnrealizedRevenue;

            // Project to end of year calculations
            const now = new Date();
            const endOfYear = new Date(now.getFullYear(), 11, 31, 17, 0, 0); // Dec 31 5pm
            const daysRemaining = Math.max(0, Math.ceil((endOfYear - now) / (1000 * 60 * 60 * 24)));

            // Calculate daily return rate based on performance so far
            const dailyReturnRate = totalDays > 0 ? grossReturn / totalDays : 0;

            // Project share price at end of year
            const projectedAdditionalReturn = dailyReturnRate * daysRemaining;
            const projectedTotalReturn = grossReturn + projectedAdditionalReturn;

            // Calculate projected fees at end of year (performance + prime on projected gains)
            const projectedPerformanceFees = (projectedTotalReturn / 100) * FEE_CONFIG.performanceFeeRate * cumulativeNetDeposits;
            const projectedPrimeFees = (projectedTotalReturn / 100) * FEE_CONFIG.primeNumberFeeRate * cumulativeNetDeposits;
            const projectedTotalRevenue = projectedPerformanceFees + projectedPrimeFees + managementFeeDollars;

            return {
                currentBalance,
                cumulativeNetDeposits,
                aum: tvl,
                sharePrice,
                grossReturn,
                netReturn,
                allTimeAPY,
                rollingAPYs,
                totalPNL,
                totalDays,
                updateTime,
                history: sortedHistory,
                performanceFees,
                realizedFeeDollars,
                unrealizedFeeDollars,
                primeRealizedFeeDollars,
                primeUnrealizedFeeDollars,
                managementFeeDollars,
                totalRealizedRevenue,
                totalUnrealizedRevenue,
                totalRevenue,
                daysRemaining,
                projectedTotalReturn,
                projectedPerformanceFees,
                projectedPrimeFees,
                projectedTotalRevenue
            };
        }

        function calculateRollingAPYs(history, currentSharePrice) {
            const periods = [
                { name: '7D', days: 7 },
                { name: '30D', days: 30 },
                { name: '90D', days: 90 },
                { name: 'All Time', days: history.length }
            ];

            return periods.map(period => {
                const daysAvailable = Math.min(period.days, history.length);
                if (daysAvailable < 1) {
                    return { name: period.name, days: 0, return: 0, apy: 0 };
                }

                const startIndex = Math.max(0, history.length - daysAvailable);
                const startPrice = history[startIndex].SharePrice;
                const endPrice = currentSharePrice;

                const periodReturn = ((endPrice - startPrice) / startPrice) * 100;
                const netPeriodReturn = periodReturn * (1 - FEE_CONFIG.totalFeeRate);
                const annualizedAPY = (netPeriodReturn / daysAvailable) * 365;

                return {
                    name: period.name,
                    days: daysAvailable,
                    return: netPeriodReturn,
                    apy: annualizedAPY
                };
            });
        }

        function formatCurrency(value) {
            return new Intl.NumberFormat('en-US', {
                style: 'currency',
                currency: 'USD',
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            }).format(value);
        }

        function formatPercent(value) {
            const sign = value >= 0 ? '+' : '';
            return `${sign}${value.toFixed(2)}%`;
        }

        function formatDate(dateStr) {
            return new Date(dateStr).toLocaleString('en-US', {
                year: 'numeric',
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                timeZoneName: 'short'
            });
        }

        function formatQuarterDate(date) {
            return date.toLocaleDateString('en-US', {
                month: 'short',
                day: 'numeric',
                year: 'numeric'
            }) + ' 5pm ET';
        }

        function getDaysUntil(date) {
            const now = new Date();
            const diff = date - now;
            return Math.ceil(diff / (1000 * 60 * 60 * 24));
        }

        function renderDashboard() {
            const metrics = calculateMetrics(currentData, historicalData);

            document.getElementById('updateTime').textContent = `Last Updated: ${formatDate(metrics.updateTime)}`;

            const returnClass = metrics.grossReturn >= 0 ? 'positive' : 'negative';
            const netReturnClass = metrics.netReturn >= 0 ? 'positive' : 'negative';
            const pnlClass = metrics.totalPNL >= 0 ? 'positive' : 'negative';

            const apyClass = metrics.allTimeAPY >= 0 ? 'positive' : 'negative';

            document.getElementById('content').innerHTML = `
                <!-- Primary Metrics -->
                <div class="metrics-grid">
                    <div class="metric-card primary">
                        <div class="metric-label">Current Balance</div>
                        <div class="metric-value">${formatCurrency(metrics.currentBalance)}</div>
                        <div class="metric-subtext">Total Value (AUM)</div>
                    </div>

                    <div class="metric-card primary">
                        <div class="metric-label">Share Price</div>
                        <div class="metric-value">${metrics.sharePrice.toFixed(6)}</div>
                        <div class="metric-subtext">Current NAV per Share</div>
                    </div>

                    <div class="metric-card ${netReturnClass === 'positive' ? 'positive' : ''}">
                        <div class="metric-label">Net ROI</div>
                        <div class="metric-value ${netReturnClass}">${formatPercent(metrics.netReturn)}</div>
                        <div class="metric-subtext">After 30% fees (${metrics.totalDays} days)</div>
                    </div>

                    <div class="metric-card ${apyClass === 'positive' ? 'positive' : ''}">
                        <div class="metric-label">Net APY (All Time)</div>
                        <div class="metric-value ${apyClass}">${formatPercent(metrics.allTimeAPY)}</div>
                        <div class="metric-subtext">Annualized, after fees</div>
                    </div>
                </div>

                <h2 class="section-title">Rolling APY (Net of Fees)</h2>
                <div class="metrics-grid">
                    ${metrics.rollingAPYs.map(apy => `
                        <div class="metric-card ${apy.apy >= 0 ? 'positive' : ''}">
                            <div class="metric-label">${apy.name} APY</div>
                            <div class="metric-value ${apy.apy >= 0 ? 'positive' : 'negative'}">${formatPercent(apy.apy)}</div>
                            <div class="metric-subtext">${apy.days} days, ${formatPercent(apy.return)} return</div>
                        </div>
                    `).join('')}
                </div>

                <h2 class="section-title">Profit & Loss</h2>
                <div class="metrics-grid">
                    <div class="metric-card ${pnlClass === 'positive' ? 'positive' : ''}">
                        <div class="metric-label">Total PNL</div>
                        <div class="metric-value ${pnlClass}">${formatCurrency(metrics.totalPNL)}</div>
                        <div class="metric-subtext">Current Balance - Net Deposits</div>
                    </div>

                    <div class="metric-card primary">
                        <div class="metric-label">Net Deposits</div>
                        <div class="metric-value">${formatCurrency(metrics.cumulativeNetDeposits)}</div>
                        <div class="metric-subtext">Total capital deposited</div>
                    </div>
                </div>

                <!-- Historical Chart -->
                <div class="chart-container">
                    <h3 class="chart-title">Historical Performance</h3>
                    <div class="chart-wrapper">
                        <canvas id="historyChart"></canvas>
                    </div>
                </div>

                <!-- Performance Fee Revenue -->
                <h2 class="section-title">Performance Fee Revenue (20%)</h2>
                <div class="metrics-grid">
                    <div class="metric-card primary">
                        <div class="metric-label">Realized Fees</div>
                        <div class="metric-value positive">${formatCurrency(metrics.realizedFeeDollars)}</div>
                        <div class="metric-subtext">${metrics.performanceFees.pastQuartersCount} quarters completed</div>
                    </div>

                    <div class="metric-card warning">
                        <div class="metric-label">Unrealized Fees</div>
                        <div class="metric-value" style="color: #fbbf24;">${formatCurrency(metrics.unrealizedFeeDollars)}</div>
                        <div class="metric-subtext">Pending until quarter end</div>
                    </div>

                    <div class="metric-card positive">
                        <div class="metric-label">Total Expected Fees</div>
                        <div class="metric-value positive">${formatCurrency(metrics.realizedFeeDollars + metrics.unrealizedFeeDollars)}</div>
                        <div class="metric-subtext">Realized + Unrealized</div>
                    </div>

                    <div class="metric-card">
                        <div class="metric-label">Next Realization</div>
                        <div class="metric-value" style="font-size: 1.2rem;">${formatQuarterDate(metrics.performanceFees.nextQuarterEnd)}</div>
                        <div class="metric-subtext">${getDaysUntil(metrics.performanceFees.nextQuarterEnd)} days remaining</div>
                    </div>
                </div>

                <!-- Prime Number Fee Revenue -->
                <h2 class="section-title">Prime Number Fee Revenue (10%)</h2>
                <div class="metrics-grid">
                    <div class="metric-card" style="border-color: rgba(124, 58, 237, 0.3);">
                        <div class="metric-label">Realized Fees</div>
                        <div class="metric-value" style="color: #a78bfa;">${formatCurrency(metrics.primeRealizedFeeDollars)}</div>
                        <div class="metric-subtext">${metrics.performanceFees.pastQuartersCount} quarters completed</div>
                    </div>

                    <div class="metric-card" style="border-color: rgba(124, 58, 237, 0.2);">
                        <div class="metric-label">Unrealized Fees</div>
                        <div class="metric-value" style="color: #c4b5fd;">${formatCurrency(metrics.primeUnrealizedFeeDollars)}</div>
                        <div class="metric-subtext">Pending until quarter end</div>
                    </div>

                    <div class="metric-card" style="border-color: rgba(124, 58, 237, 0.3);">
                        <div class="metric-label">Total Expected Fees</div>
                        <div class="metric-value" style="color: #a78bfa;">${formatCurrency(metrics.primeRealizedFeeDollars + metrics.primeUnrealizedFeeDollars)}</div>
                        <div class="metric-subtext">Realized + Unrealized</div>
                    </div>
                </div>

                <!-- Management Fee Revenue -->
                <h2 class="section-title">Management Fee Revenue (2%)</h2>
                <div class="metrics-grid">
                    <div class="metric-card" style="border-color: rgba(244, 114, 182, 0.3);">
                        <div class="metric-label">Total Management Fees</div>
                        <div class="metric-value" style="color: #f472b6;">${formatCurrency(metrics.managementFeeDollars)}</div>
                        <div class="metric-subtext">Already collected on deposits</div>
                    </div>

                    <div class="metric-card" style="border-color: rgba(244, 114, 182, 0.2);">
                        <div class="metric-label">Original Deposits</div>
                        <div class="metric-value" style="color: #f9a8d4;">${formatCurrency(metrics.cumulativeNetDeposits + metrics.managementFeeDollars)}</div>
                        <div class="metric-subtext">Before 2% fee deduction</div>
                    </div>
                </div>

                <!-- Total Revenue Summary -->
                <h2 class="section-title">Total Revenue Summary</h2>
                <div class="metrics-grid">
                    <div class="metric-card primary">
                        <div class="metric-label">Total Realized Revenue</div>
                        <div class="metric-value positive">${formatCurrency(metrics.totalRealizedRevenue)}</div>
                        <div class="metric-subtext">Performance + Prime + Management</div>
                    </div>

                    <div class="metric-card warning">
                        <div class="metric-label">Total Unrealized Revenue</div>
                        <div class="metric-value" style="color: #fbbf24;">${formatCurrency(metrics.totalUnrealizedRevenue)}</div>
                        <div class="metric-subtext">Pending quarter end</div>
                    </div>

                    <div class="metric-card" style="background: linear-gradient(135deg, rgba(34, 197, 94, 0.2) 0%, rgba(0, 212, 255, 0.2) 100%); border-color: rgba(34, 197, 94, 0.4);">
                        <div class="metric-label">Grand Total Revenue</div>
                        <div class="metric-value positive" style="font-size: 2rem;">${formatCurrency(metrics.totalRevenue)}</div>
                        <div class="metric-subtext">All fees combined</div>
                    </div>
                </div>

                <!-- Projected End of Year Revenue -->
                <h2 class="section-title">Projected End of Year Revenue</h2>
                <div class="metrics-grid">
                    <div class="metric-card" style="border-color: rgba(56, 189, 248, 0.3);">
                        <div class="metric-label">Days Remaining</div>
                        <div class="metric-value" style="color: #38bdf8;">${metrics.daysRemaining}</div>
                        <div class="metric-subtext">Until Dec 31, ${new Date().getFullYear()}</div>
                    </div>

                    <div class="metric-card" style="border-color: rgba(56, 189, 248, 0.3);">
                        <div class="metric-label">Projected Return</div>
                        <div class="metric-value" style="color: #38bdf8;">${formatPercent(metrics.projectedTotalReturn)}</div>
                        <div class="metric-subtext">If current pace continues</div>
                    </div>

                    <div class="metric-card" style="border-color: rgba(34, 197, 94, 0.3);">
                        <div class="metric-label">Projected Performance Fee</div>
                        <div class="metric-value" style="color: #22c55e;">${formatCurrency(metrics.projectedPerformanceFees)}</div>
                        <div class="metric-subtext">20% of projected gains</div>
                    </div>

                    <div class="metric-card" style="border-color: rgba(124, 58, 237, 0.3);">
                        <div class="metric-label">Projected Prime Fee</div>
                        <div class="metric-value" style="color: #a78bfa;">${formatCurrency(metrics.projectedPrimeFees)}</div>
                        <div class="metric-subtext">10% of projected gains</div>
                    </div>

                    <div class="metric-card" style="background: linear-gradient(135deg, rgba(56, 189, 248, 0.2) 0%, rgba(34, 197, 94, 0.2) 100%); border-color: rgba(56, 189, 248, 0.4);">
                        <div class="metric-label">Total Projected Revenue (EOY)</div>
                        <div class="metric-value" style="color: #38bdf8; font-size: 2rem;">${formatCurrency(metrics.projectedTotalRevenue)}</div>
                        <div class="metric-subtext">Performance + Prime + Management</div>
                    </div>
                </div>
            `;

            // Render chart
            renderChart(metrics.history);
        }

        function renderChart(history) {
            const ctx = document.getElementById('historyChart').getContext('2d');

            const labels = history.map(h => {
                const date = new Date(h.update_time_utc);
                return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
            });

            const tvlData = history.map(h => h.tvl);
            const sharePriceData = history.map(h => h.SharePrice);

            if (chart) {
                chart.destroy();
            }

            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'TVL ($)',
                            data: tvlData,
                            borderColor: '#00d4ff',
                            backgroundColor: 'rgba(0, 212, 255, 0.1)',
                            fill: true,
                            tension: 0.4,
                            yAxisID: 'y'
                        },
                        {
                            label: 'Share Price',
                            data: sharePriceData,
                            borderColor: '#7c3aed',
                            backgroundColor: 'rgba(124, 58, 237, 0.1)',
                            fill: true,
                            tension: 0.4,
                            yAxisID: 'y1'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    plugins: {
                        legend: {
                            labels: {
                                color: '#8b8ba7'
                            }
                        },
                        tooltip: {
                            backgroundColor: 'rgba(26, 26, 62, 0.9)',
                            titleColor: '#fff',
                            bodyColor: '#8b8ba7',
                            borderColor: 'rgba(255, 255, 255, 0.1)',
                            borderWidth: 1,
                            callbacks: {
                                label: function(context) {
                                    if (context.datasetIndex === 0) {
                                        return `TVL: $${context.parsed.y.toLocaleString()}`;
                                    }
                                    return `Share Price: ${context.parsed.y.toFixed(6)}`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: {
                                color: 'rgba(255, 255, 255, 0.05)'
                            },
                            ticks: {
                                color: '#6b6b8d'
                            }
                        },
                        y: {
                            type: 'linear',
                            display: true,
                            position: 'left',
                            grid: {
                                color: 'rgba(255, 255, 255, 0.05)'
                            },
                            ticks: {
                                color: '#00d4ff',
                                callback: function(value) {
                                    return '$' + (value / 1000000).toFixed(2) + 'M';
                                }
                            }
                        },
                        y1: {
                            type: 'linear',
                            display: true,
                            position: 'right',
                            grid: {
                                drawOnChartArea: false,
                            },
                            ticks: {
                                color: '#7c3aed',
                                callback: function(value) {
                                    return value.toFixed(4);
                                }
                            }
                        }
                    }
                }
            });
        }

        // Auto-refresh every 1 minute
        setInterval(fetchData, 60 * 1000);

        // Initial load
        fetchData();
    </script>
</body>
</html>
