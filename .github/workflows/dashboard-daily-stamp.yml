name: Dashboard Daily Stamp

on:
  schedule:
    - cron: '0,15,30,45 21,22 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dashboard-daily-stamp
  cancel-in-progress: false

jobs:
  stamp:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Stamp dashboard freshness
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            node scripts/stamp-dashboard-freshness.js --daily-window-et
          else
            node scripts/stamp-dashboard-freshness.js
          fi

      - name: Commit stamp
        run: |
          if [ -z "$(git status --porcelain -- data/dashboard-freshness.json data/jlp-strategy-latest.json)" ]; then
            echo "No dashboard stamp changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/dashboard-freshness.json data/jlp-strategy-latest.json
          git commit -m "Dashboard stamp: $(TZ=America/New_York date '+%Y-%m-%d %I:%M %p %Z')"
          git push
